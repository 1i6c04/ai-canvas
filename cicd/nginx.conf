# =============================================================================
# nginx.conf — AI Canvas virtual host
# Copy to: /etc/nginx/sites-available/ai-canvas
# Replace YOUR_DOMAIN with your actual domain (e.g. canvas.example.com)
# Then run: sudo certbot --nginx -d YOUR_DOMAIN
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name YOUR_DOMAIN;

    root /var/www/ai-canvas;
    index index.php;

    # --- SSL (managed by Certbot — do not edit this block manually) ---
    # ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # --- Security headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Block access to sensitive files ---
    location ~ /\.(env|csrf_secret|git) {
        deny all;
        return 404;
    }
    location ~ \.sqlite(-journal|-wal|-shm)?$ {
        deny all;
        return 404;
    }

    # --- PHP via PHP-FPM ---
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.1-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # --- Static assets (CSS, images, etc.) ---
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # --- Default: serve PHP ---
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # --- Logging ---
    access_log /var/log/nginx/ai-canvas-access.log;
    error_log  /var/log/nginx/ai-canvas-error.log;
}
